<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reim-Challenge</title>
    <link rel="stylesheet" href="reim-style.css">
</head>
<body>
    <div class="container">
        <h1>🎤 Reim-Challenge</h1>
        <p class="subtitle">Finde einen Reim auf das Wort!</p>

        <div class="word-display">
            <span class="label">Dein Wort:</span>
            <span class="word" id="target-word">---</span>
        </div>

        <div class="input-area">
            <input type="text" id="rhyme-input" placeholder="Dein Reim..." autocomplete="off">
            <button id="check-btn">Prüfen ✓</button>
        </div>

        <div class="result" id="result">
            <p id="result-text">Warte auf deine Antwort...</p>
        </div>

        <div class="scoreboard">
            <div class="score">
                <span class="label">Punkte</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="score">
                <span class="label">Runde</span>
                <span class="value" id="round">1</span>
            </div>
        </div>

        <button class="next-btn" id="next-btn" style="display:none;">Nächstes Wort →</button>
        <button class="reset-btn" id="reset-btn">🔄 Neues Spiel</button>

        <nav class="game-nav">
            <a href="index.html">✊ Schere Stein Papier</a> |
            <a href="labyrinth.html">🏰 Labyrinth</a>
        </nav>
    </div>

    <script src="reim-game.js"></script>
</body>
</html>
